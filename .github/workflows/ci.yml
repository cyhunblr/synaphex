name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Check for Secrets (Secretlint)
      run: npm run lint:secrets

    - name: Lint Markdown (Markdownlint)
      run: npm run lint:md

    - name: Lint Code (ESLint & Prettier)
      run: npm run lint

    - name: Build Project
      run: npm run build --if-present

    - name: Run Tests
      run: npm test --if-present
